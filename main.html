html 태그 문법으로 열고 닫는 태그의 한 쌍으로 이루어 져있습니다 <html></html> 등
혹은 스스로 열리고 닫히는 태그도 존재합니다 <img/> <input/> 등
html 문서의 기본 뼈대 구조는 <html></html> 태그로 전체를 감싸고 있고, 사이트의 주요 내용들이 들어 있는 머리부분인 <head></head>부분과 실제 화면이 그려지는 <body></body>로 이루어져 있습니다.
<head>태그에는 주요하게 외부 플랫폼에 사이트 정보를 제공해주는 meta 태그와 브라우저 상의 탭 이름에 해당하는 title 태그, 그리고 뒤에서 배울 스타일 속성을 작성하는 <style>태그영역과 스크립트를 작성하는 <script> 태그 영역으로 이루어 져있습니다.
meta 태그는 구글이나 네이버 같은 포털 사이트에서 여러분의 웹 사이트를 내걸때, 사용자들에게 보여줄 주요 사이트 정보들을 긁어오는 곳입니다. <meta name="description" content="HTML meta tag page"> <meta name="keyword" content="HTML, meta, tag, element, reference"> <meta name="author" content="TCPSchool">
title은 브라우저의 탭 부분에 표시되는 웹사이트 제목입니다. 클래스101|준비물까지 챙겨주는 온라인 스쿨~ 이부분이 바로 그 제목이겠죠?
<body>태그 안에는 실제로 화면에 그려지는 태그들이 존재합니다.
<h1></h1> : 제목을 나타낼 때 주로 사용하는 태그, 굵기와 크기가 1부터 6까지 작아집니다.
<p></p> : 문단을 나타내는 태그, 태그 사이에 글을 작성하면 다음 태그와는 자동으로 이격되서 문단의 성격을 갖습니다.
<span></span> : 긴 글 중간에 특정 글자의 색을 바꾸거나 스타일을 바꾸고 싶을 때 태그 안에서 사용하는 태그입니다.
<ul> <li></li> </ul> : 화면상에서 리스트를 만들어줄 때 사용하는 유용한 태그 입니다.
<img src="이미지 주소"/> : 이미지를 나타내는 태그, src라는 속성에 이미지 주소를 넣습니다.
<button>버튼이름</button> : 화면상에 사용자가 누를 수 있는 버튼을 생성합니다. 버튼을 눌렀을때 실행되는 이벤트는 <button onclick="함수()">버튼 이름 </button>과 같이 onclick 속성에 자바스크립트 함수를 연결하여 정의합니다. 이는 자바스크립트 때 또 배웁니다.
<br/> : 스스로 닫히는 태그로 태그 사이의 줄바꿈을 할때 사용합니다.
<hr/> : 줄바꿈을 하면서 수평선을 그려줍니다. -->
